<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(168,85,247,0.3), #000);
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}
.logo-img{
  width:240px;
  margin:auto;
  display:block;
  filter:drop-shadow(0 0 25px #a855f7);
}
.subtitle{
  opacity:0.7;
  letter-spacing:3px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  max-width:220px;
  margin:auto;
}

.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:0.5s;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

.card h3{
  position:absolute;
  bottom:10px;
  left:10px;
  z-index:2;
}

.preview{
  position:absolute;
  bottom:30px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:6px;
  z-index:2;
}

/* hover */
.card:hover{
  transform:translateY(-10px) scale(1.05);
}
.card:hover img{
  transform:scale(1.15);
}

/* vista dia */
#vista-dia{
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}
#vista-dia.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* BOTON VOLVER PRO */
.volver{
  display:flex;
  align-items:center;
  gap:8px;
  margin:20px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(168,85,247,0.5);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.volver img{
  width:18px;
}
.volver:hover{
  background:#a855f7;
  box-shadow:0 0 20px #a855f7;
}

/* DISCORD PRO */
.discord{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #5865F2;
  text-decoration:none;
  color:white;
  transition:0.3s;
}
.discord img{
  width:20px;
}
.discord:hover{
  background:#5865F2;
  box-shadow:0 0 20px #5865F2;
}

/* PARTICULAS */
#particles{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* CUERVO */
#cuervo{
  position:fixed;
  top:20%;
  left:-200px;
  width:180px;
  pointer-events:none;
  animation:vuelo 20s linear infinite;
}

@keyframes vuelo{
  0%{left:-200px}
  100%{left:110%}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<img src="cuervo.gif" id="cuervo">

<header>
  <img src="logo.png" class="logo-img">
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<!-- INICIO -->
<div class="container" id="inicio">

<div class="card" onclick="mostrarDia('lunes')">
  <img src="reyhongo.png">
  <div class="preview">Rey Hongo</div>
  <h3>LUNES</h3>
</div>

<div class="card" onclick="mostrarDia('martes')">
  <img src="img2.png">
  <div class="preview">Próximamente</div>
  <h3>MARTES</h3>
</div>

<div class="card" onclick="mostrarDia('miercoles')">
  <img src="img3.png">
  <div class="preview">Próximamente</div>
  <h3>MIÉRCOLES</h3>
</div>

<div class="card" onclick="mostrarDia('jueves')">
  <img src="img4.png">
  <div class="preview">Próximamente</div>
  <h3>JUEVES</h3>
</div>

<div class="card" onclick="mostrarDia('viernes')">
  <img src="img5.png">
  <div class="preview">Próximamente</div>
  <h3>VIERNES</h3>
</div>

<div class="card" onclick="mostrarDia('sabado')">
  <img src="img6.png">
  <div class="preview">Próximamente</div>
  <h3>SÁBADO</h3>
</div>

<div class="card" onclick="mostrarDia('domingo')">
  <img src="margrave.png">
  <div class="preview">Margrave</div>
  <h3>DOMINGO</h3>
</div>

</div>

<!-- VISTA DIA -->
<div id="vista-dia">
  <button class="volver" onclick="volver()">
    <img src="volver.png"> Volver
  </button>

  <h2 id="titulo" style="text-align:center;margin-bottom:20px;"></h2>
  <div class="container" id="contenido"></div>
</div>

<a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">
  <img src="discord.png"> Discord
</a>

<script>
const data={
  lunes:[
    {nombre:"Rey Hongo",img:"reyhongo.png",link:"https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224"}
  ],
  martes:[],
  miercoles:[],
  jueves:[],
  viernes:[],
  sabado:[],
  domingo:[
    {nombre:"Margrave",img:"margrave.png",link:"https://manhwaweb.com/manhwa/el-mago-sin-valor-del-margrave_1776633397302"}
  ]
};

function mostrarDia(dia){
  document.getElementById("inicio").style.display="none";
  document.getElementById("vista-dia").classList.add("active");
  document.getElementById("titulo").innerText=dia.toUpperCase();

  const cont=document.getElementById("contenido");
  cont.innerHTML="";

  data[dia].forEach(m=>{
    cont.innerHTML+=`
    <div class="card">
      <img src="${m.img}">
      <h3>${m.nombre}</h3>
      <a href="${m.link}" target="_blank" style="position:absolute;inset:0;"></a>
    </div>`;
  });
}

function volver(){
  document.getElementById("inicio").style.display="grid";
  document.getElementById("vista-dia").classList.remove("active");
}

/* PARTICULAS MEJORADAS */
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+0.5,
    d:Math.random()*0.4+0.1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(168,85,247,0.5)';
    ctx.fill();

    p.y+=p.d;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,30);
</script>

</body>
</html>
