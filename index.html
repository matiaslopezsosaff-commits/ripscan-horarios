<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Modo Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { background:#0b0b0c; color:#e5e5e5; font-family:sans-serif; }
.navbar { background:#0f0f10; border-bottom:1px solid #1f1f1f; }
.brand { color:#ffcc00; font-weight:700; font-size:20px; }
.search { max-width:250px; background:#1a1a1a; border:none; color:white; }
.search::placeholder { color:#888; }

.section-title { font-size:14px; text-transform:uppercase; color:#aaa; margin:20px 0 10px; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }

.card {
 background:#111;
 border-radius:8px;
 overflow:hidden;
 transition:.2s;
 position:relative;
}

.card:hover { transform:translateY(-4px); }

.card img {
 width:100%;
 height:200px;
 object-fit:cover;
}

.card-body {
 padding:8px;
}

.title {
 font-size:12px;
 font-weight:600;
 line-height:1.2;
 height:30px;
 overflow:hidden;
}

.chapter {
 font-size:11px;
 color:#ffcc00;
}

.badge-new {
 position:absolute;
 top:6px;
 left:6px;
 background:#ffcc00;
 color:#000;
 font-size:9px;
 padding:2px 5px;
 border-radius:4px;
}

.top-bar {
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

.btn-filter {
 background:#1a1a1a;
 border:none;
 color:#aaa;
 font-size:12px;
 padding:5px 10px;
}

.btn-filter:hover { color:#fff; }

</style>
</head>
<body>

<nav class="navbar px-3">
<span class="brand">RipScan</span>
<input class="form-control form-control-sm search ms-auto" id="search" placeholder="Buscar manga...">
</nav>

<div class="container mt-3">

<div class="top-bar">
<h6 class="section-title">🔥 Últimos Capítulos</h6>
<button class="btn-filter">Ver todo</button>
</div>
<div class="grid" id="latest"></div>

<div class="top-bar">
<h6 class="section-title">📚 Biblioteca</h6>
<div>
<button class="btn-filter">Popular</button>
<button class="btn-filter">A-Z</button>
</div>
</div>
<div class="grid" id="library"></div>

</div>

<script>
const obras = [
{titulo:"Un pequeño mundo lleno de diversión", cap:1, img:"https://picsum.photos/200/300?1", fecha:"2026-04-19"},
{titulo:"El mago inútil del Margrave", cap:1, img:"https://picsum.photos/200/300?2", fecha:"2026-04-18"},
{titulo:"El ascenso del Rey Hongo", cap:3, img:"https://picsum.photos/200/300?3", fecha:"2026-04-20"}
];

function esNuevo(fecha){
 return (new Date() - new Date(fecha)) < 2*24*60*60*1000;
}

function crearCard(o){
 return `
 <div class="card">
 ${esNuevo(o.fecha)?'<div class="badge-new">NEW</div>':''}
 <img src="${o.img}">
 <div class="card-body">
 <div class="title">${o.titulo}</div>
 <div class="chapter">Cap ${o.cap}</div>
 </div>
 </div>`;
}

function render(){
 const lib = document.getElementById("library");
 const latest = document.getElementById("latest");
 
 const ordenadas = [...obras].sort((a,b)=> new Date(b.fecha)-new Date(a.fecha));
 
 lib.innerHTML = obras.map(crearCard).join("");
 latest.innerHTML = ordenadas.slice(0,6).map(crearCard).join("");
}

render();

// buscador tipo asura
document.getElementById("search").addEventListener("input", e=>{
 const val = e.target.value.toLowerCase();
 document.querySelectorAll(".card").forEach(c=>{
 c.style.display = c.innerText.toLowerCase().includes(val)?"":"none";
 });
});
</script>

</body>
</html>
