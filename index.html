<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== FONDO ===== */
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== NAVBAR ===== */
.navbar {
  background: rgba(10,10,20,0.6);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,140,0,0.2);
}

.navbar-brand {
  font-weight: bold;
  color: orange !important;
}

/* ===== BUSCADOR ===== */
.nav-search {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,140,0,0.3);
  color: white;
}

.nav-search:focus {
  border-color: orange;
  box-shadow: 0 0 10px rgba(255,140,0,0.6);
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.book-card {
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  overflow: hidden;
  transition: 0.35s;
  position: relative;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,140,0,0.1);
}

.book-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 20px 40px rgba(255,140,0,0.25);
}

.book-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,140,0,0.2), transparent);
  opacity: 0;
  transition: 0.4s;
}

.book-card:hover::before {
  opacity: 1;
}

.book-card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: 0.4s;
}

.book-card:hover img {
  transform: scale(1.08);
}

.book-info {
  padding: 10px;
}

.book-title {
  font-size: 14px;
  font-weight: bold;
  color: #facc15;
}

.book-chapter {
  font-size: 12px;
  color: #9ca3af;
}

/* ===== BADGE ===== */
.badge-new {
  position: absolute;
  top: 10px;
  left: 10px;
  background: orange;
  color: black;
  font-size: 10px;
  padding: 4px 6px;
  border-radius: 6px;
  font-weight: bold;
  box-shadow: 0 0 10px orange;
}

/* ===== SCROLL ===== */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(orange, red);
  border-radius: 10px;
}

/* ===== ANIM ===== */
.fade-in {
  animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <span class="navbar-brand">RipScan</span>

    <input id="search" class="form-control nav-search w-50" placeholder="Buscar manhwa...">
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">
  <div id="grid" class="grid"></div>
</div>

<script>

/* ===== DATA (EDITABLE) ===== */
const mangas = [
  {
    titulo: "El Ascenso del Rey Hongo",
    cap: "Capítulo 3",
    img: "https://via.placeholder.com/300x400",
    new: true
  },
  {
    titulo: "El mago inútil del Margrave",
    cap: "Capítulo 1",
    img: "https://via.placeholder.com/300x400",
    new: true
  },
  {
    titulo: "Un pequeño mundo lleno de diversión",
    cap: "Capítulo 1",
    img: "https://via.placeholder.com/300x400",
    new: false
  }
];

/* ===== RENDER ===== */
const grid = document.getElementById("grid");

function render(lista) {
  grid.innerHTML = "";
  lista.forEach(m => {
    grid.innerHTML += `
      <div class="book-card fade-in">
        ${m.new ? '<span class="badge-new">NEW</span>' : ''}
        <img src="${m.img}">
        <div class="book-info">
          <div class="book-title">${m.titulo}</div>
          <div class="book-chapter">${m.cap}</div>
        </div>
      </div>
    `;
  });
}

render(mangas);

/* ===== BUSCADOR ===== */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const filtrado = mangas.filter(m =>
    m.titulo.toLowerCase().includes(q)
  );
  render(filtrado);
});

/* ===== SPOTLIGHT EFFECT ===== */
document.addEventListener("mousemove", e => {
  document.querySelectorAll(".book-card").forEach(card => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    card.style.background = `
      radial-gradient(circle at ${x}px ${y}px, rgba(255,140,0,0.15), transparent 60%),
      rgba(255,255,255,0.04)
    `;
  });
});

</script>

</body>
</html>
