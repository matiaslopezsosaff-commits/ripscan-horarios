<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(168,85,247,0.25), #000);
  z-index:1;
}

/* PARTICLES CANVAS */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

/* CONTENT */
header, .container, #vista-dia, .discord{
  position:relative;
  z-index:2;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}
.logo-img{
  width:240px;
  margin:auto;
  display:block;
  filter:drop-shadow(0 0 25px #a855f7);
}
.subtitle{
  opacity:0.7;
  letter-spacing:3px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  max-width:220px;
  margin:auto;
}

.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:0.5s;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

.card h3{
  position:absolute;
  bottom:10px;
  left:10px;
  z-index:2;
}

.preview{
  position:absolute;
  bottom:30px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:6px;
  z-index:2;
}

/* hover */
.card:hover{
  transform:translateY(-10px) scale(1.05);
}
.card:hover img{
  transform:scale(1.15);
}

/* vista dia */
#vista-dia{
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}
#vista-dia.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* BOTON VOLVER */
.volver{
  display:flex;
  align-items:center;
  gap:8px;
  margin:20px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(168,85,247,0.5);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.volver:hover{
  background:#a855f7;
  box-shadow:0 0 20px #a855f7;
}

/* DISCORD */
.discord{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #5865F2;
  text-decoration:none;
  color:white;
}
.discord:hover{
  background:#5865F2;
  box-shadow:0 0 20px #5865F2;
}

/* CUERVO */
#cuervo{
  position:fixed;
  top:20%;
  left:-200px;
  width:180px;
  pointer-events:none;
  z-index:2;
  animation:vuelo 20s linear infinite;
}

@keyframes vuelo{
  0%{left:-200px}
  100%{left:110%}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<img src="cuervo.gif" id="cuervo">

<header>
  <img src="logo.png" class="logo-img">
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="container" id="inicio">

<div class="card" onclick="mostrarDia('lunes')">
  <img src="reyhongo.png">
  <div class="preview">Rey Hongo</div>
  <h3>LUNES</h3>
</div>

<div class="card" onclick="mostrarDia('domingo')">
  <img src="margrave.png">
  <div class="preview">Margrave</div>
  <h3>DOMINGO</h3>
</div>

</div>

<div id="vista-dia">
  <button class="volver" onclick="volver()">← Volver</button>
  <h2 id="titulo" style="text-align:center;margin-bottom:20px;"></h2>
  <div class="container" id="contenido"></div>
</div>

<a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">Discord</a>

<script>
/* DATA */
const data={
  lunes:[
    {nombre:"Rey Hongo",img:"reyhongo.png",link:"https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224"}
  ],
  domingo:[
    {nombre:"Margrave",img:"margrave.png",link:"https://manhwaweb.com/manhwa/el-mago-sin-valor-del-margrave_1776633397302"}
  ]
};

function mostrarDia(dia){
  document.getElementById("inicio").style.display="none";
  document.getElementById("vista-dia").classList.add("active");
  document.getElementById("titulo").innerText=dia.toUpperCase();

  const cont=document.getElementById("contenido");
  cont.innerHTML="";

  data[dia].forEach(m=>{
    cont.innerHTML+=`
    <div class="card">
      <img src="${m.img}">
      <h3>${m.nombre}</h3>
      <a href="${m.link}" target="_blank" style="position:absolute;inset:0;"></a>
    </div>`;
  });
}

/* VOLVER */
function volver(){
  document.getElementById("inicio").style.display="grid";
  document.getElementById("vista-dia").classList.remove("active");
}

/* PARTICULAS NIVEL DIOS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    r:Math.random()*2+1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    // glow
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*2,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,0.1)";
    ctx.fill();

    // núcleo
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,0.8)";
    ctx.fill();
  });

  // conexiones
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x;
      let dy=particles[i].y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<100){
        ctx.strokeStyle="rgba(168,85,247,0.1)";
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

onresize=()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
</script>

</body>
</html>
