<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay oscuro + violeta */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(168,85,247,0.25), rgba(0,0,0,0.95));
  z-index:-1;
}

/* LOGO */
.logo-img{
  width:150px;
  display:block;
  margin:auto;
  filter: drop-shadow(0 0 15px rgba(168,85,247,0.7));
}

header{
  text-align:center;
  padding:40px 20px;
}

.subtitle{
  opacity:0.7;
  margin-top:10px;
  letter-spacing:3px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(168,85,247,0.3);
  border-radius:18px;
  padding:10px;
  text-align:center;
  transition:0.4s;
  backdrop-filter:blur(8px);
  overflow:hidden;
}

.card h3{
  margin-bottom:10px;
  font-size:14px;
  letter-spacing:1px;
  opacity:0.8;
}

/* IMAGEN */
.card img{
  width:100%;
  border-radius:12px;
  transition:0.4s;
}

/* HOVER PRO */
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px rgba(168,85,247,0.7);
}

.card:hover img{
  transform:scale(1.1);
}

/* DISCORD */
footer{
  text-align:center;
  padding:30px;
}

.discord{
  display:inline-block;
  padding:12px 25px;
  border-radius:12px;
  background:linear-gradient(90deg,#5865F2,#a855f7);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.discord:hover{
  box-shadow:0 0 20px #a855f7;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo-img">
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="container">

<div class="card">
  <h3>LUNES</h3>
  <a href="https://tusitio.com/rey-hongo" target="_blank">
    <img src="reyhongo.png">
  </a>
</div>

  <div class="card">
    <h3>MARTES</h3>
    <a href="martes.html">
      <img src="img2.png">
    </a>
  </div>

  <div class="card">
    <h3>MIÉRCOLES</h3>
    <a href="miercoles.html">
      <img src="img3.png">
    </a>
  </div>

  <div class="card">
    <h3>JUEVES</h3>
    <a href="jueves.html">
      <img src="img4.png">
    </a>
  </div>

  <div class="card">
    <h3>VIERNES</h3>
    <a href="viernes.html">
      <img src="img5.png">
    </a>
  </div>

  <div class="card">
    <h3>SÁBADO</h3>
    <a href="sabado.html">
      <img src="img6.png">
    </a>
  </div>

  <div class="card">
    <h3>DOMINGO</h3>
    <a href="domingo.html">
      <img src="margrave.png">
    </a>
  </div>

</div>

<footer>
  <a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">
    Unirse al Discord
  </a>
</footer>

</body>
</html>
