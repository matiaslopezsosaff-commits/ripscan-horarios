<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background: radial-gradient(circle at top, #1a0033, #000);
  color:white;
  overflow-x:hidden;
}
header{
  text-align:center;
  padding:40px 20px;
}
.logo{
  font-size:60px;
  font-weight:700;
  background: linear-gradient(90deg,#fff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.subtitle{
  opacity:0.7;
  margin-top:10px;
  letter-spacing:2px;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(168,85,247,0.3);
  border-radius:15px;
  padding:10px;
  text-align:center;
  transition:0.3s;
  backdrop-filter:blur(10px);
}
.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 0 20px rgba(168,85,247,0.5);
}
.card h3{
  margin-bottom:10px;
  font-size:14px;
  letter-spacing:1px;
  opacity:0.8;
}
.card img{
  width:100%;
  border-radius:10px;
}
footer{
  text-align:center;
  padding:30px;
  margin-top:20px;
}
.discord{
  display:inline-block;
  padding:10px 20px;
  border-radius:10px;
  background:linear-gradient(90deg,#5865F2,#a855f7);
  color:white;
  text-decoration:none;
  transition:0.3s;
}
.discord:hover{
  opacity:0.8;
}
</style>
</head>
<body>

<header>
  <div class="logo">RIPSCAN</div>
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="container">

  <div class="card">
    <h3>LUNES</h3>
    <img src="reyhongo.png">
  </div>

  <div class="card">
    <h3>MARTES</h3>
  </div>

  <div class="card">
    <h3>MIÉRCOLES</h3>
  </div>

  <div class="card">
    <h3>JUEVES</h3>
  </div>

  <div class="card">
    <h3>VIERNES</h3>
  </div>

  <div class="card">
    <h3>SÁBADO</h3>
  </div>

  <div class="card">
    <h3>DOMINGO</h3>
    <img src="margrave.png">
  </div>

</div>

<footer>
  <a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">Unirse al Discord</a>
</footer>

</body>
</html>
