<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.25), rgba(0,0,0,0.95));
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 20px;
  animation:fadeUp 1s ease;
}

.logo-img{
  width:260px;
  max-width:90%;
  display:block;
  margin:auto;
  filter: drop-shadow(0 0 25px rgba(168,85,247,0.9));
}

.subtitle{
  opacity:0.7;
  margin-top:15px;
  letter-spacing:4px;
  font-size:13px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:25px;
  padding:30px;
  max-width:1200px;
  margin:auto;
  transition:0.4s;
}

/* CARD */
.card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.5s;
}

/* overlay */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* borde */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  border:1px solid rgba(168,85,247,0.2);
  z-index:2;
}

/* textos */
.card h3{
  position:absolute;
  bottom:10px;
  left:15px;
  font-size:14px;
  z-index:2;
}

.preview{
  position:absolute;
  bottom:30px;
  left:15px;
  font-size:12px;
  z-index:2;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:6px;
}

/* hover */
.card:hover{
  transform:translateY(-10px) scale(1.03);
}
.card:hover img{
  transform:scale(1.15);
}
.card:hover::before{
  border:1px solid rgba(168,85,247,0.8);
  box-shadow:0 0 25px rgba(168,85,247,0.6);
}

/* VISTA DIA */
#vista-dia{
  display:none;
  opacity:0;
  transform:translateY(30px);
  transition:0.4s;
}

#vista-dia.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

.volver{
  margin-bottom:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}
.volver:hover{
  box-shadow:0 0 15px #a855f7;
}

/* animación */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo-img">
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<!-- INICIO -->
<div class="container" id="inicio">

  <div class="card" onclick="mostrarDia('lunes')">
    <img src="reyhongo.png">
    <div class="preview">Rey Hongo</div>
    <h3>LUNES</h3>
  </div>

  <div class="card" onclick="mostrarDia('martes')">
    <img src="img2.png">
    <div class="preview">Próximamente</div>
    <h3>MARTES</h3>
  </div>

  <div class="card" onclick="mostrarDia('domingo')">
    <img src="margrave.png">
    <div class="preview">Margrave</div>
    <h3>DOMINGO</h3>
  </div>

</div>

<!-- VISTA DIA -->
<div id="vista-dia">
  <div class="container">
    <button class="volver" onclick="volver()">← Volver</button>
    <h2 id="titulo"></h2>
  </div>

  <div class="container" id="contenido"></div>
</div>

<script>
const data = {
  lunes: [
    {
      nombre:"Rey Hongo",
      img:"reyhongo.png",
      link:"https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224"
    }
  ],
  domingo: [
    {
      nombre:"El Mago del Margrave",
      img:"margrave.png",
      link:"https://manhwaweb.com/manhwa/el-mago-sin-valor-del-margrave_1776633397302"
    }
  ]
};

function mostrarDia(dia){
  document.getElementById("inicio").style.display="none";
  const vista = document.getElementById("vista-dia");
  vista.classList.add("active");

  document.getElementById("titulo").innerText = dia.toUpperCase();

  const cont = document.getElementById("contenido");
  cont.innerHTML="";

  data[dia].forEach(m=>{
    cont.innerHTML += `
      <div class="card">
        <img src="${m.img}">
        <h3>${m.nombre}</h3>
        <a href="${m.link}" target="_blank" style="position:absolute;inset:0;"></a>
      </div>
    `;
  });
}

function volver(){
  document.getElementById("inicio").style.display="grid";
  document.getElementById("vista-dia").classList.remove("active");
}
</script>

</body>
</html>
