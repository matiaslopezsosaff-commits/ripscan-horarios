<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RipScan | Horarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.25), rgba(0,0,0,0.95));
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 20px;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
}

.logo-img{
  width:260px;
  max-width:90%;
  display:block;
  margin:auto;
  filter: drop-shadow(0 0 25px rgba(168,85,247,0.9));
}

.subtitle{
  opacity:0.7;
  margin-top:15px;
  letter-spacing:4px;
  font-size:13px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:25px;
  padding:30px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
}

.card:nth-child(1){animation-delay:0.2s}
.card:nth-child(2){animation-delay:0.3s}
.card:nth-child(3){animation-delay:0.4s}
.card:nth-child(4){animation-delay:0.5s}
.card:nth-child(5){animation-delay:0.6s}
.card:nth-child(6){animation-delay:0.7s}
.card:nth-child(7){animation-delay:0.8s}

/* imagen */
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.5s;
}

/* overlay */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* texto */
.card h3{
  position:absolute;
  bottom:10px;
  left:15px;
  font-size:14px;
  letter-spacing:2px;
  z-index:2;
}

/* borde */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  border:1px solid rgba(168,85,247,0.2);
  z-index:2;
}

/* hover */
.card:hover{
  transform:translateY(-10px) scale(1.03);
}

.card:hover img{
  transform:scale(1.15);
}

.card:hover::before{
  border:1px solid rgba(168,85,247,0.8);
  box-shadow:0 0 25px rgba(168,85,247,0.6);
}

/* link full */
.card a{
  position:absolute;
  inset:0;
  z-index:3;
}

/* footer */
footer{
  text-align:center;
  padding:40px 20px;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
  animation-delay:1s;
}

.discord{
  display:inline-block;
  padding:14px 30px;
  border-radius:14px;
  background:linear-gradient(90deg,#5865F2,#a855f7);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.discord:hover{
  box-shadow:0 0 25px #a855f7;
  transform:scale(1.05);
}

/* animación */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* PARTICULAS */
#particles{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* CUERVO */
#cuervo{
  position:fixed;
  top:20%;
  left:-200px;
  width:180px;
  opacity:0.9;
  pointer-events:none;
  filter: drop-shadow(0 0 10px rgba(168,85,247,0.7));
  animation:vuelo 15s linear infinite;
}

@keyframes vuelo{
  0%{left:-200px; transform:translateY(0)}
  50%{transform:translateY(-40px)}
  100%{left:110%; transform:translateY(0)}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<img src="cuervo.gif" id="cuervo">

<header>
  <img src="logo.png" class="logo-img">
  <div class="subtitle">HORARIOS DE PUBLICACIÓN</div>
</header>

<div class="container">

<div class="card">
  <img src="reyhongo.png">
  <h3>LUNES</h3>
  <a href="https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224" target="_blank"></a>
</div>

<div class="card">
  <img src="img2.png">
  <h3>MARTES</h3>
  <a href="#"></a>
</div>

<div class="card">
  <img src="img3.png">
  <h3>MIÉRCOLES</h3>
  <a href="#"></a>
</div>

<div class="card">
  <img src="img4.png">
  <h3>JUEVES</h3>
  <a href="#"></a>
</div>

<div class="card">
  <img src="img5.png">
  <h3>VIERNES</h3>
  <a href="#"></a>
</div>

<div class="card">
  <img src="img6.png">
  <h3>SÁBADO</h3>
  <a href="#"></a>
</div>

<div class="card">
  <img src="margrave.png">
  <h3>DOMINGO</h3>
  <a href="https://manhwaweb.com/manhwa/el-mago-sin-valor-del-margrave_1776633397302" target="_blank"></a>
</div>

</div>

<footer>
  <a class="discord" href="https://discord.gg/js8B2VgNcd" target="_blank">
    Unirse al Discord
  </a>
</footer>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2+1,
    d: Math.random()*0.5+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='rgba(168,85,247,0.6)';

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  particles.forEach(p=>{
    p.y+=p.d;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,30);

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
