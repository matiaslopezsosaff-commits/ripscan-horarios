<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunes | RipScan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: url('fondo.jpg') center/cover no-repeat fixed;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(168,85,247,0.25), rgba(0,0,0,0.95));
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
}

h1{
  letter-spacing:4px;
  font-size:22px;
}

/* BOTON VOLVER */
.volver{
  position:absolute;
  left:20px;
  top:20px;
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:8px 15px;
  border-radius:10px;
  transition:0.3s;
}

.volver:hover{
  background:#a855f7;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.item{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
}

.item:nth-child(1){animation-delay:0.2s}
.item:nth-child(2){animation-delay:0.3s}
.item:nth-child(3){animation-delay:0.4s}
.item:nth-child(4){animation-delay:0.5s}

/* imagen */
.item img{
  width:100%;
  height:240px;
  object-fit:cover;
  transition:0.5s;
}

/* overlay */
.item::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* nombre */
.nombre{
  position:absolute;
  bottom:10px;
  left:12px;
  font-size:13px;
  z-index:2;
}

/* hover */
.item:hover{
  transform:scale(1.05);
}

.item:hover img{
  transform:scale(1.15);
}

/* animación */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<a href="index.html" class="volver">← Volver</a>

<header>
  <h1>LUNES</h1>
</header>

<div class="grid">

<a href="https://manhwaweb.com/manhwa/el-ascenso-del-rey-hongo_1776286372224" target="_blank">
  <div class="item">
    <img src="reyhongo.png">
    <div class="nombre">Rey Hongo</div>
  </div>
</a>

<a href="#">
  <div class="item">
    <img src="otro.png">
    <div class="nombre">Otro Manhwa</div>
  </div>
</a>

</div>

</body>
</html>
